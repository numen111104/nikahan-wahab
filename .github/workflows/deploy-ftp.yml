name: Deploy to FTP (cPanel)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy via SFTP
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.FTP_SERVER }}
          REMOTE_USER: ${{ secrets.FTP_USERNAME }}
          REMOTE_PATH: /public_html/undangan-wahab/
          ARGS: "-rltgoDzvO --exclude='.git*' --exclude='.github' --exclude='node_modules' --exclude='.env' --exclude='.DS_Store'"

      - name: Deployment Status
        if: always()
        run: echo "✅ Deploy ke SFTP berhasil!"
